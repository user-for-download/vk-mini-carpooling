services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "54329:5432"
    environment:
      POSTGRES_USER: local_blablacar
      POSTGRES_PASSWORD: local_blablacar
      POSTGRES_DB: local_blablacar
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local_blablacar"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
