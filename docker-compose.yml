services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "54329:5432"
    environment:
      POSTGRES_USER: local_blablacar
      POSTGRES_PASSWORD: local_blablacar
      POSTGRES_DB: local_blablacar
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local_blablacar"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://local_blablacar:local_blablacar@postgres:5432/local_blablacar
      VK_APP_SECRET: testsecret
      # IMPORTANT: Keep MOCK=true and NODE_ENV=development for local docker testing
      # For true production, remove NODE_ENV (defaults to production from Dockerfile) and set MOCK=false
      VK_AUTH_MOCK_ENABLED: "true"
      NODE_ENV: "development"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
